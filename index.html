<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Party Photo Upload</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5; color: #333;
        min-height: 100vh; display: flex; justify-content: center;
        align-items: flex-start; padding: 40px 16px;
      }
      .container {
        background: #fff; border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        padding: 32px; max-width: 480px; width: 100%;
      }
      h1 { font-size: 1.5rem; margin-bottom: 4px; }
      .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
      label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
      input[type="text"] {
        width: 100%; padding: 10px 12px; border: 1px solid #ccc;
        border-radius: 8px; font-size: 1rem; margin-bottom: 20px;
      }
      input[type="text"]:focus {
        outline: none; border-color: #4285f4;
        box-shadow: 0 0 0 2px rgba(66,133,244,0.2);
      }
      .drop-zone {
        border: 2px dashed #ccc; border-radius: 12px; padding: 40px 20px;
        text-align: center; cursor: pointer;
        transition: border-color 0.2s, background 0.2s; margin-bottom: 20px;
      }
      .drop-zone:hover, .drop-zone.dragover {
        border-color: #4285f4; background: #f0f6ff;
      }
      .drop-zone p { font-size: 0.95rem; color: #666; }
      .drop-zone .icon { font-size: 2rem; margin-bottom: 8px; }
      .file-list { margin-bottom: 20px; }
      .file-item {
        display: flex; align-items: center; justify-content: space-between;
        padding: 8px 12px; background: #f9f9f9; border-radius: 8px;
        margin-bottom: 6px; font-size: 0.85rem;
      }
      .file-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 8px; }
      .file-item .size { color: #999; margin-right: 8px; white-space: nowrap; }
      .file-item .remove {
        color: #d93025; cursor: pointer; font-weight: bold;
        font-size: 1.1rem; border: none; background: none; padding: 0 4px;
      }
      .btn {
        width: 100%; padding: 12px; background: #4285f4; color: #fff;
        font-size: 1rem; font-weight: 600; border: none; border-radius: 8px;
        cursor: pointer; transition: background 0.2s;
      }
      .btn:hover { background: #3367d6; }
      .btn:disabled { background: #a0c4ff; cursor: not-allowed; }
      .progress-bar-container {
        width: 100%; background: #e0e0e0; border-radius: 8px;
        overflow: hidden; margin-bottom: 8px; display: none;
      }
      .progress-bar { height: 8px; background: #4285f4; width: 0%; transition: width 0.3s; }
      .status { text-align: center; font-size: 0.9rem; margin-top: 12px; min-height: 1.2em; }
      .status.error { color: #d93025; }
      .status.success { color: #0d904f; }
      .results { margin-top: 16px; }
      .results .result-item { padding: 6px 0; font-size: 0.85rem; border-bottom: 1px solid #eee; }
      .results .result-item:last-child { border-bottom: none; }
      .results .result-item.ok::before { content: "✓ "; color: #0d904f; }
      .results .result-item.fail::before { content: "✗ "; color: #d93025; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📸 Álbum Caio e Nathalia</h1>
      <p class="subtitle">Carregue suas fotos aqui!</p>

      <label for="uploaderName">Seu Nome (opcional)</label>
      <input type="text" id="uploaderName" placeholder="e.g. Jane" />

      <label>Photos</label>
      <div class="drop-zone" id="dropZone">
        <div class="icon">📁</div>
        <p>Clique aqui para selecionar a photo</p>
        <input type="file" id="fileInput" multiple accept="image/*,video/*" style="display:none" />
      </div>

      <div class="file-list" id="fileList"></div>

      <div class="progress-bar-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <button class="btn" id="uploadBtn" disabled>Carregar</button>

      <div class="status" id="status"></div>
      <div class="results" id="results"></div>
    </div>

    <script>
      // ============================================================
      // IMPORTANT: Replace this with your deployed Apps Script URL
      // ============================================================
      var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwV8FH6ilDs1TCWFPlqWj93ftnMSzEjt-YG4Yixc44XKv7fK449q_vUsXodSwNT7ZgPbw/exec";

      var selectedFiles = [];
      var dropZone = document.getElementById("dropZone");
      var fileInput = document.getElementById("fileInput");
      var fileListEl = document.getElementById("fileList");
      var uploadBtn = document.getElementById("uploadBtn");
      var statusEl = document.getElementById("status");
      var resultsEl = document.getElementById("results");
      var progressContainer = document.getElementById("progressContainer");
      var progressBar = document.getElementById("progressBar");

      dropZone.addEventListener("click", function () { fileInput.click(); });

      dropZone.addEventListener("dragover", function (e) {
        e.preventDefault(); dropZone.classList.add("dragover");
      });
      dropZone.addEventListener("dragleave", function () {
        dropZone.classList.remove("dragover");
      });
      dropZone.addEventListener("drop", function (e) {
        e.preventDefault(); dropZone.classList.remove("dragover");
        addFiles(e.dataTransfer.files);
      });

      fileInput.addEventListener("change", function () {
        addFiles(fileInput.files); fileInput.value = "";
      });

      function addFiles(files) {
        for (var i = 0; i < files.length; i++) {
          var file = files[i];
          var exists = selectedFiles.some(function (f) {
            return f.name === file.name && f.size === file.size;
          });
          if (!exists) selectedFiles.push(file);
        }
        renderFileList();
      }

      function renderFileList() {
        fileListEl.innerHTML = "";
        selectedFiles.forEach(function (file, index) {
          var div = document.createElement("div");
          div.className = "file-item";
          div.innerHTML =
            '<span class="name">' + escapeHtml(file.name) + "</span>" +
            '<span class="size">' + formatSize(file.size) + "</span>" +
            '<button class="remove" data-index="' + index + '">&times;</button>';
          fileListEl.appendChild(div);
        });
        fileListEl.querySelectorAll(".remove").forEach(function (btn) {
          btn.addEventListener("click", function () {
            selectedFiles.splice(parseInt(this.getAttribute("data-index")), 1);
            renderFileList();
          });
        });
        uploadBtn.disabled = selectedFiles.length === 0;
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / 1048576).toFixed(1) + " MB";
      }

      function escapeHtml(str) {
        var d = document.createElement("div"); d.textContent = str; return d.innerHTML;
      }

      function readFileAsBase64(file) {
        return new Promise(function (resolve, reject) {
          var reader = new FileReader();
          reader.onload = function () { resolve(reader.result.split(",")[1]); };
          reader.onerror = function () { reject(reader.error); };
          reader.readAsDataURL(file);
        });
      }

      async function sendFile(base64, fileName, mimeType, uploaderName) {
        var response = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({
            fileData: base64,
            fileName: fileName,
            mimeType: mimeType,
            uploaderName: uploaderName
          })
        });
        // With no-cors, we can't read the response body,
        // so we assume success if no network error was thrown.
        return { success: true };
      }

      uploadBtn.addEventListener("click", async function () {
        if (selectedFiles.length === 0) return;

        var uploaderName = document.getElementById("uploaderName").value.trim();
        uploadBtn.disabled = true;
        statusEl.className = "status";
        statusEl.textContent = "Uploading...";
        resultsEl.innerHTML = "";
        progressContainer.style.display = "block";
        progressBar.style.width = "0%";

        var total = selectedFiles.length;
        var failed = 0;

        for (var i = 0; i < total; i++) {
          var file = selectedFiles[i];
          statusEl.textContent = "Uploading... (" + (i + 1) + "/" + total + ")";
          progressBar.style.width = Math.round(((i + 1) / total) * 100) + "%";

          var div = document.createElement("div");
          try {
            var base64 = await readFileAsBase64(file);
            await sendFile(base64, file.name, file.type, uploaderName);
            div.className = "result-item ok";
            div.textContent = file.name + " — uploaded";
          } catch (err) {
            failed++;
            div.className = "result-item fail";
            div.textContent = file.name + " — " + (err.message || "upload failed");
          }
          resultsEl.appendChild(div);
        }

        if (failed === 0) {
          statusEl.className = "status success";
          statusEl.textContent = "All " + total + " file(s) uploaded successfully!";
        } else {
          statusEl.className = "status error";
          statusEl.textContent = (total - failed) + " of " + total + " uploaded. " + failed + " failed.";
        }
        selectedFiles = [];
        renderFileList();
        uploadBtn.disabled = false;
      });
    </script>
  </body>
</html>
